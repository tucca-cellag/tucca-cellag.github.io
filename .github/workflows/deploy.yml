name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the GitHub Actions Pages deploy (OIDC token + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a running deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install
        run: pnpm --dir site install --frozen-lockfile
      - name: Build
        run: pnpm --dir site build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
